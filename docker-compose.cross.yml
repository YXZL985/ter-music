version: '3.8'

services:
  cross-build:
    build:
      context: .
      dockerfile: Dockerfile.cross-build
    image: ter-music-cross:latest
    container_name: ter-music-cross
    volumes:
      - .:/workspace
    working_dir: /workspace
    # Override command as needed
    command: ["./build-deb.sh", "-a", "arm64"]
    # Keep container running for interactive use
    stdin_open: true
    tty: true
